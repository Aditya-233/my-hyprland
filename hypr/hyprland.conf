########################################
# MONITORS
########################################
monitorv2 {
    output = eDP-1
    mode = 1920x1200@60
    scale = 1.5
    sdr_eotf = srgb
#    icc = /home/aditya/.config/hypr/windows11.icm
}


########################################
# ENVIRONMENT
########################################
ecosystem {
    no_update_news = true
}

env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = GDK_BACKEND,wayland

########################################
# AUTOSTART
########################################
exec-once = mako
exec-once = /usr/local/bin/power-profile-auto.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swaybg -i ~/.config/hypr/current_wallpaper -m fill

########################################
# INPUT
########################################
input {
    repeat_rate = 50
    repeat_delay = 300
    accel_profile = flat
    kb_options = caps:escape
    touchpad {
        natural_scroll = true
    }
}

cursor {
    inactive_timeout = 3
}

########################################
# GENERAL LAYOUT & LOOK
########################################
general {
    gaps_out = 0
    gaps_in = 0
    border_size = 0
}

decoration {
    inactive_opacity = 1
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

########################################
# PERFORMANCE / MISC
########################################
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

xwayland {
    enabled = false
}

########################################
# WINDOW RULES
########################################
windowrule {
    name = image-viewer
    match:class = ^imv$
    float = on
    size = 900 500
    center = on
    pin = on
}

windowrule {
    name = video
    match:class = ^mpv$
    fullscreen = on
}

windowrule {
    name = ide
    match:class = ^dev.zed.Zed$
    fullscreen = on
}

windowrule {
    name = browser
    match:class = helium-browser
    fullscreen = on
}

########################################
# KEYBINDINGS
########################################
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

binde = SUPER, TAB, workspace, e+1
binde = SUPER SHIFT, TAB, workspace, e-1
binde = ALT, TAB, cyclenext

bind = SUPER, W, killactive
bind = SUPER, RETURN, exec, foot
bind = SUPER, B, exec, helium-browser
bind = SUPER, Z, exec, zeditor
bind = SUPER, F, exec, thunar -w

bind = SUPER, SPACE, exec, rofi -show drun -theme ~/.config/rofi/config.rasi
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy

bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER CTRL, SPACE, exec, ~/.config/hypr/scripts/wallpaper-change.sh
bind = SUPER, escape, exec, ~/.config/hypr/scripts/powermenu.sh

########################################
# MEDIA / OSD
########################################
$notify = notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 800

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+ && $notify "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | cut -d. -f1)%"
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && $notify "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | cut -d. -f1)%"
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $notify "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo 'MUTED' || wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | cut -d. -f1)"
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && $notify "Mic: $(wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q MUTED && echo 'MUTED' || echo 'UNMUTED')"

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5% && $notify "Brightness: $(brightnessctl info | grep -oP '\(\K[^%]+')%"
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && $notify "Brightness: $(brightnessctl info | grep -oP '\(\K[^%]+')%"

bindel = ALT, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 1%+ && $notify "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | cut -d. -f1)%"
bindel = ALT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- && $notify "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | cut -d. -f1)%"
bindel = ALT, XF86MonBrightnessUp, exec, brightnessctl set +1% && $notify "Brightness: $(brightnessctl info | grep -oP '\(\K[^%]+')%"
bindel = ALT, XF86MonBrightnessDown, exec, brightnessctl set 1%- && $notify "Brightness: $(brightnessctl info | grep -oP '\(\K[^%]+')%"
