# Use the modern libplacebo-based renderer (v0.41+ standard)
vo=gpu-next
# Enable hardware decoding for lower CPU usage
hwdec=auto
# Use Vulkan for better performance on Linux/Arch
gpu-api=vulkan

# Start with high-quality defaults
profile=high-quality
# Enable debanding (removes "pixel steps" in flat colors/anime)
deband=yes
# Smoother motion: interpolates frames to match your monitor's refresh rate
interpolation=yes
video-sync=display-resample

# My monitor aspect-ratio
video-aspect-override=16:10
